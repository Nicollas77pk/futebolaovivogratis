<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard IPTV</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    scrollbar-width: thin;
    scrollbar-color: #a5edf5 #0f1c24;
  }

  body {
    background: #0b1419;
    color: white;
    min-height: 100vh;
  }

  .dashboard {
    display: grid;
    grid-template-columns: 220px 260px 1fr;
    gap: 20px;
    padding: 20px;
    height: 100vh;
  }

  .categories, .channel-list, .player-section {
    background: #0f1c24;
    border-radius: 15px;
    padding: 20px;
    overflow-y: auto;
    box-shadow: 0 0 20px rgba(165, 237, 245, 0.08);
  }

  h2 {
    font-size: 18px;
    margin-bottom: 10px;
    border-bottom: 2px solid rgba(165, 237, 245, 0.2);
    padding-bottom: 8px;
  }

  .category-item, .channel-item {
    padding: 12px;
    background: #13232c;
    margin-bottom: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }

  .category-item:hover, .channel-item:hover {
    background: #1a323d;
    transform: translateX(5px);
  }

  .category-item.active, .channel-item.active {
    border-left: 4px solid #a5edf5;
    background: #1a323d;
  }

  .channel-logo {
    width: 35px;
    height: 35px;
    margin-right: 10px;
  }

  .channel-item {
    display: flex;
    align-items: center;
  }

  .video-player {
    width: 100%;
    height: calc(100% - 100px);
    background: black;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 15px;
    position: relative;
  }

  video {
    width: 100%;
    height: 100%;
  }

  .loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    padding: 15px 25px;
    border-radius: 10px;
    display: none;
  }

  .player-controls {
    display: flex;
    gap: 10px;
  }

  .control-button {
    flex: 1;
    background: linear-gradient(135deg, #a5edf5, #6ed0db);
    color: #0b1419;
    font-weight: bold;
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
  }

  .search-box {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
    background: #13232c;
    color: white;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .dashboard {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<div class="dashboard">

  <div class="categories">
    <h2>Categorias</h2>
    <div id="categoryContainer"></div>
  </div>

  <div class="channel-list">
    <h2>Canais</h2>
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar canal..." oninput="filterChannels()">
    <div id="channelContainer"></div>
  </div>

  <div class="player-section">
    <div class="video-player">
      <div id="loader" class="loader">Carregando canal...</div>
      <video id="videoPlayer" controls></video>
    </div>

    <div class="player-controls">
      <button class="control-button" onclick="playPrevious()">⏮</button>
      <button class="control-button" onclick="togglePlay()">⏯</button>
      <button class="control-button" onclick="playNext()">⏭</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
let categories = {};
let channels = [];
let currentChannelIndex = 0;
let currentCategory = '';

function fetchChannels() {
  fetch('/api/canais')
    .then(res => res.text())
    .then(text => parseM3U(text));
}

function parseM3U(m3uText) {
  categories = {};
  const lines = m3uText.split('\n');
  let name = '', logo = '', group = '';

  lines.forEach(line => {
    if (line.startsWith('#EXTINF')) {
      const nameMatch = line.match(/,(.*)$/);
      const logoMatch = line.match(/tvg-logo="([^"]+)"/);
      const groupMatch = line.match(/group-title="([^"]+)"/);

      name = nameMatch ? nameMatch[1] : '';
      logo = logoMatch ? logoMatch[1] : '';
      group = groupMatch ? groupMatch[1] : 'Outros';

      if (!categories[group]) categories[group] = [];
    } 
    else if (line && !line.startsWith('#')) {
      categories[group].push({
        name: name,
        url: line.trim(),
        logo: logo
      });
    }
  });

  renderCategories();
}

function renderCategories() {
  const container = document.getElementById('categoryContainer');
  container.innerHTML = '';

  Object.keys(categories).forEach(cat => {
    const div = document.createElement('div');
    div.className = 'category-item';
    div.innerText = cat;
    div.onclick = () => {
      currentCategory = cat;
      channels = categories[cat];
      renderChannelList();
    };
    container.appendChild(div);
  });
}

function renderChannelList(list = channels) {
  const container = document.getElementById('channelContainer');
  container.innerHTML = '';

  list.forEach((channel, index) => {
    const div = document.createElement('div');
    div.className = 'channel-item';
    div.innerHTML = `
      ${channel.logo ? `<img class="channel-logo" src="${channel.logo}">` : ''}
      <div>${channel.name}</div>
    `;
    div.onclick = () => playChannel(index);
    container.appendChild(div);
  });

  if (channels.length > 0) playChannel(0);
}

function playChannel(index) {
  currentChannelIndex = index;
  const channel = channels[index];
  const video = document.getElementById('videoPlayer');
  const loader = document.getElementById('loader');

  loader.style.display = 'block';

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(channel.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      loader.style.display = 'none';
      video.play();
    });
  } else {
    video.src = channel.url;
    video.onloadeddata = () => loader.style.display = 'none';
    video.play();
  }
}

function playPrevious() {
  currentChannelIndex = (currentChannelIndex - 1 + channels.length) % channels.length;
  playChannel(currentChannelIndex);
}

function playNext() {
  currentChannelIndex = (currentChannelIndex + 1) % channels.length;
  playChannel(currentChannelIndex);
}

function togglePlay() {
  const video = document.getElementById('videoPlayer');
  if (video.paused) video.play();
  else video.pause();
}

function filterChannels() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = channels.filter(c => c.name.toLowerCase().includes(search));
  renderChannelList(filtered);
}

fetchChannels();
</script>

</body>
</html>
