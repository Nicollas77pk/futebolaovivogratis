<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #0b1419;
  color: white;
}

/* LAYOUT DESKTOP */
.dashboard {
  display: grid;
  grid-template-columns: 220px 260px 1fr;
  gap: 15px;
  padding: 15px;
  height: 100vh;
}

.categories, .channel-list, .player-section {
  background: rgba(15, 28, 36, 0.75);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 15px;
  overflow-y: auto;
  box-shadow: 0 0 25px rgba(165, 237, 245, 0.08);
  border: 1px solid rgba(165, 237, 245, 0.08);
}

h2 {
  margin-bottom: 10px;
  font-size: 16px;
}

.category-item, .channel-item {
  padding: 10px;
  background: linear-gradient(145deg, #13232c, #0f1c24);
  margin-bottom: 6px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.category-item:hover, .channel-item:hover {
  background: linear-gradient(145deg, #1a323d, #13232c);
  transform: translateX(4px);
}

.channel-item {
  display: flex;
  align-items: center;
}

.channel-logo {
  width: 30px;
  margin-right: 10px;
}

.video-player {
  width: 100%;
  height: calc(100% - 60px);
  background: black;
  border-radius: 10px;
  overflow: hidden;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.player-controls {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.control-button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #a5edf5;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.search-box {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
  background: #13232c;
  color: white;
}

/* SCROLL MODERNO */
.channel-list::-webkit-scrollbar {
  width: 8px;
}
.channel-list::-webkit-scrollbar-track {
  background: #0b1419;
}
.channel-list::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #a5edf5, #6ed0db);
  border-radius: 10px;
}

/* MOBILE */
.mobile-menu {
  display: none;
}

@media(max-width:768px){

.dashboard {
  display: block;
  height: auto;
}

.player-section {
  height: 55vh;
}

.categories, .channel-list {
  position: fixed;
  top: 0;
  left: -100%;
  width: 75%;
  height: 100%;
  z-index: 999;
  transition: 0.3s;
}

.categories.active,
.channel-list.active {
  left: 0;
}

.mobile-menu {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.mobile-menu button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #a5edf5;
  color: black;
  font-weight: bold;
}
}
