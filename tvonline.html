<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard IPTV</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background: #0b1419;
  color: white;
}

.dashboard {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
  padding: 20px;
  height: 100vh;
}

.channel-list, .player-section {
  background: #0f1c24;
  border-radius: 15px;
  padding: 20px;
  overflow-y: auto;
}

.channel-item {
  display: flex;
  align-items: center;
  padding: 10px;
  background: #13232c;
  margin-bottom: 8px;
  border-radius: 8px;
  cursor: pointer;
}

.channel-item.active {
  border-left: 4px solid #a5edf5;
}

.channel-logo {
  width: 35px;
  height: 35px;
  margin-right: 10px;
}

.video-player {
  width: 100%;
  height: 400px;
  background: black;
  border-radius: 10px;
  margin-bottom: 10px;
  position: relative;
}

video, iframe {
  width: 100%;
  height: 100%;
}

.player-controls {
  display: flex;
  gap: 10px;
}

.control-button {
  flex: 1;
  background: #a5edf5;
  border: none;
  padding: 10px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

#optionsMenu {
  display: none;
  background: #13232c;
  margin-top: 10px;
  border-radius: 10px;
  padding: 10px;
}

.option-item {
  padding: 10px;
  background: #1a323d;
  margin-bottom: 5px;
  border-radius: 6px;
  cursor: pointer;
}

.option-item:hover {
  background: #244552;
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="channel-list">
    <h3>Canais</h3>
    <button class="control-button" onclick="fetchChannels()">Carregar Lista</button>
    <div id="channelContainer"></div>
  </div>

  <div class="player-section">
    <div class="video-player"></div>

    <div class="player-controls">
      <button class="control-button" onclick="togglePlay()">⏯ Play</button>
      <button class="control-button" onclick="toggleOptions()">⚙️ Opções</button>
    </div>

    <div id="optionsMenu"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let channels = [];
let currentChannelIndex = 0;

function fetchChannels() {
  fetch('/api/canais')
    .then(res => res.text())
    .then(text => parseM3U(text));
}

function parseM3U(text) {
  channels = [];
  const lines = text.split('\n');

  let name = '', logo = '';

  lines.forEach((line, i) => {
    line = line.trim();

    if (line.startsWith('#EXTINF')) {
      name = line.split(',')[1] || 'Canal';
      const logoMatch = line.match(/tvg-logo="([^"]+)"/);
      logo = logoMatch ? logoMatch[1] : '';
    } 
    else if (line && !line.startsWith('#')) {

      channels.push({
        name,
        logo,
        frames: [
          line,
          line, // pode trocar depois
          line  // pode trocar depois
        ]
      });
    }
  });

  renderChannelList();
  if (channels.length) playChannel(0);
}

function renderChannelList() {
  const container = document.getElementById('channelContainer');
  container.innerHTML = '';

  channels.forEach((channel, index) => {
    const div = document.createElement('div');
    div.className = 'channel-item';
    div.innerHTML = `
      <div class="channel-logo">
        ${channel.logo ? `<img src="${channel.logo}" width="100%">` : ''}
      </div>
      ${channel.name}
    `;

    div.onclick = () => playChannel(index);
    container.appendChild(div);
  });
}

function playChannel(index) {
  currentChannelIndex = index;
  playCustomFrame(channels[index].frames[0]);
  highlightActive();
}

function playCustomFrame(url) {
  const player = document.querySelector('.video-player');
  player.innerHTML = '';

  if (url.includes('m3u8') && Hls.isSupported()) {
    const video = document.createElement('video');
    video.controls = true;
    video.autoplay = true;
    player.appendChild(video);

    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.allowFullscreen = true;
    player.appendChild(iframe);
  }
}

function toggleOptions() {
  const menu = document.getElementById('optionsMenu');

  if (menu.style.display === 'none' || menu.style.display === '') {
    renderOptions();
    menu.style.display = 'block';
  } else {
    menu.style.display = 'none';
  }
}

function renderOptions() {
  const menu = document.getElementById('optionsMenu');
  const channel = channels[currentChannelIndex];

  menu.innerHTML = '';

  channel.frames.forEach((frame, i) => {
    const div = document.createElement('div');
    div.className = 'option-item';
    div.innerText = `Player ${i + 1}`;

    div.onclick = () => playCustomFrame(frame);

    menu.appendChild(div);
  });
}

function togglePlay() {
  const video = document.querySelector('video');
  if (!video) return;

  if (video.paused) video.play();
  else video.pause();
}

function highlightActive() {
  document.querySelectorAll('.channel-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentChannelIndex);
  });
}

fetchChannels();
</script>

</body>
</html>
