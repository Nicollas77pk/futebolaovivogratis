<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard IPTV</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  scrollbar-width: thin;
  scrollbar-color: #a5edf5 #0f1c24;
}

html { scroll-behavior: smooth; }

body {
  background: #0b1419;
  color: white;
  min-height: 100vh;
}

.dashboard {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
  padding: 20px;
  height: 100vh;
}

.channel-list, .player-section {
  background: #0f1c24;
  border-radius: 15px;
  padding: 20px;
  height: calc(100vh - 40px);
  overflow-y: auto;
  position: relative;
}

.channel-item {
  display: flex;
  align-items: center;
  padding: 12px;
  background: #13232c;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.channel-item.active {
  border-left: 4px solid #a5edf5;
}

.video-player {
  width: 100%;
  height: calc(100% - 100px);
  background: black;
  border-radius: 10px;
  margin-bottom: 15px;
  position: relative;
}

video, iframe {
  width: 100%;
  height: 100%;
}

.loader {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.7);
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
}

.player-controls {
  display: flex;
  gap: 10px;
}

.control-button {
  flex: 1;
  background: linear-gradient(135deg, #a5edf5, #6ed0db);
  border: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="dashboard">

<div class="channel-list">
  <h2>Canais</h2>
  <button onclick="fetchChannels()">Carregar Lista</button>
  <div id="channelContainer"></div>
</div>

<div class="player-section">

  <div class="video-player">
    <div id="loader" class="loader">Carregando...</div>
  </div>

  <div class="player-controls">
    <button class="control-button" onclick="playFrameIndex(0)">Player 1</button>
    <button class="control-button" onclick="playFrameIndex(1)">Player 2</button>
    <button class="control-button" onclick="playFrameIndex(2)">Player 3</button>
  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
let channels = [];
let currentChannelIndex = 0;

/* =========================
   FETCH
========================= */
function fetchChannels() {
  fetch('/api/canais')
    .then(res => res.text())
    .then(text => parseM3U(text));
}

/* =========================
   PARSE CORRIGIDO 🔥
========================= */
function parseM3U(m3uText) {
  channels = [];
  const lines = m3uText.split('\n');

  let currentChannel = null;

  lines.forEach((line, i) => {
    line = line.trim();

    if (line.startsWith('#EXTINF')) {
      const nameMatch = line.match(/,(.*)$/);

      currentChannel = {
        name: nameMatch ? nameMatch[1] : `Canal ${i}`,
        frames: [],
        logo: '',
        type: 'embed'
      };

      channels.push(currentChannel);
    }

    else if (line && !line.startsWith('#') && currentChannel) {

      let detectedType = 'embed';

      if (line.includes('m3u8')) detectedType = 'm3u8';
      else if (line.includes('.mp4')) detectedType = 'mp4';

      currentChannel.frames.push(line);
      currentChannel.type = detectedType;
    }
  });

  renderChannelList();
  if (channels.length > 0) playChannel(0);
}

/* =========================
   LISTA
========================= */
function renderChannelList() {
  const container = document.getElementById('channelContainer');
  container.innerHTML = '';

  channels.forEach((ch, index) => {
    const div = document.createElement('div');
    div.className = 'channel-item';
    div.innerText = ch.name;

    div.onclick = () => playChannel(index);

    container.appendChild(div);
  });
}

/* =========================
   PLAY CANAL
========================= */
function playChannel(index) {
  currentChannelIndex = index;
  playFrameIndex(0);
  highlight();
}

/* =========================
   TROCAR PLAYER
========================= */
function playFrameIndex(i) {
  const channel = channels[currentChannelIndex];
  if (!channel.frames[i]) return;

  playCustomFrame(channel.frames[i]);
}

/* =========================
   PLAYER
========================= */
function playCustomFrame(url) {
  const player = document.querySelector('.video-player');

  player.innerHTML = `<div id="loader" class="loader">Carregando...</div>`;
  const loader = document.getElementById('loader');
  loader.style.display = 'block';

  if (url.includes('m3u8') && Hls.isSupported()) {
    const video = document.createElement('video');
    video.controls = true;
    video.autoplay = true;
    player.appendChild(video);

    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      loader.style.display = 'none';
      video.play();
    });

  } else {
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.allowFullscreen = true;
    player.appendChild(iframe);

    setTimeout(() => loader.style.display = 'none', 1500);
  }
}

/* =========================
   UI
========================= */
function highlight() {
  const items = document.querySelectorAll('.channel-item');
  items.forEach((el, i) => {
    el.classList.toggle('active', i === currentChannelIndex);
  });
}

fetchChannels();
</script>

</body>
</html>
