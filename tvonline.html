<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #0b1419;
  color: white;
}

/* LAYOUT DESKTOP */
.dashboard {
  display: grid;
  grid-template-columns: 220px 260px 1fr;
  gap: 15px;
  padding: 15px;
  height: 100vh;
}

.categories, .channel-list, .player-section {
  background: rgba(15, 28, 36, 0.75);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 15px;
  overflow-y: auto;
  box-shadow: 0 0 25px rgba(165, 237, 245, 0.08);
  border: 1px solid rgba(165, 237, 245, 0.08);
}

h2 {
  margin-bottom: 10px;
  font-size: 16px;
}

.category-item, .channel-item {
  padding: 10px;
  background: linear-gradient(145deg, #13232c, #0f1c24);
  margin-bottom: 6px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.category-item:hover, .channel-item:hover {
  background: linear-gradient(145deg, #1a323d, #13232c);
  transform: translateX(4px);
}

.channel-item {
  display: flex;
  align-items: center;
}

.channel-logo {
  width: 30px;
  margin-right: 10px;
}

.video-player {
  width: 100%;
  height: calc(100% - 60px);
  background: black;
  border-radius: 10px;
  overflow: hidden;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.player-controls {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.control-button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #a5edf5;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.search-box {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
  background: #13232c;
  color: white;
}

/* SCROLL MODERNO */
.channel-list::-webkit-scrollbar {
  width: 8px;
}
.channel-list::-webkit-scrollbar-track {
  background: #0b1419;
}
.channel-list::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #a5edf5, #6ed0db);
  border-radius: 10px;
}

/* MOBILE */
.mobile-menu {
  display: none;
}

@media(max-width:768px){

.dashboard {
  display: block;
  height: auto;
}

.player-section {
  height: 55vh;
}

.categories, .channel-list {
  position: fixed;
  top: 0;
  left: -100%;
  width: 75%;
  height: 100%;
  z-index: 999;
  transition: 0.3s;
}

.categories.active,
.channel-list.active {
  left: 0;
}

.mobile-menu {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.mobile-menu button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #a5edf5;
  color: black;
  font-weight: bold;
}
}
</style>
</head>

<body>

<div class="dashboard">

<div class="categories">
  <h2>Categorias</h2>
  <div id="categoryContainer"></div>
</div>

<div class="channel-list">
  <h2>Canais</h2>
  <input class="search-box" id="searchInput" placeholder="Buscar..." oninput="filterChannels()">
  <div id="channelContainer"></div>
</div>

<div class="player-section">

  <!-- MENU MOBILE -->
  <div class="mobile-menu">
    <button onclick="toggleCategories()">Categorias</button>
    <button onclick="toggleChannels()">Canais</button>
  </div>

  <div class="video-player">
    <iframe id="videoPlayer"></iframe>
  </div>

  <div class="player-controls">
    <button class="control-button" onclick="playPrevious()">⏮</button>
    <button class="control-button" onclick="playNext()">⏭</button>
  </div>

</div>

</div>

<script>
let categories = {};
let channels = [];
let currentIndex = 0;

function fetchChannels(){
  fetch('/api/canais')
  .then(res=>res.text())
  .then(text=>parseM3U(text));
}


function parseM3U(text){
  categories = {};
  const lines = text.split('\n'); // <-- CORRETO

  let name='', logo='', group='';

  lines.forEach(line=>{
    if(line.startsWith('#EXTINF')){
      name = line.split(',')[1];
      group = (line.match(/group-title="([^"]+)"/)||[])[1] || 'Outros';
      logo = (line.match(/tvg-logo="([^"]+)"/)||[])[1] || '';

      if(!categories[group]) categories[group]=[];
    }
    else if(line && !line.startsWith('#')){
      categories[group].push({
        name,
        url: line.trim(),
        logo
      });
    }
  });

  renderCategories();
}

  renderCategories();
}

function renderCategories(){
  const container = document.getElementById('categoryContainer');
  container.innerHTML='';

  Object.keys(categories).forEach(cat=>{
    const div = document.createElement('div');
    div.className='category-item';
    div.innerText=cat;

    div.onclick=()=>{
      channels = categories[cat];
      renderChannels();
      document.querySelector('.categories').classList.remove('active');
    };

    container.appendChild(div);
  });

  const first = Object.keys(categories)[0];
  channels = categories[first];
  renderChannels();
}

function renderChannels(list=channels){
  const container = document.getElementById('channelContainer');
  container.innerHTML='';

  list.forEach((ch,i)=>{
    const div=document.createElement('div');
    div.className='channel-item';

    div.innerHTML = `
      ${ch.logo ? `<img class="channel-logo" src="${ch.logo}">` : ''}
      ${ch.name}
    `;

    div.onclick=()=>{
      currentIndex=i;
      playChannel(ch);
      document.querySelector('.channel-list').classList.remove('active');
    };

    container.appendChild(div);
  });

  if(list.length) playChannel(list[0]);
}

function playChannel(channel){
  document.getElementById('videoPlayer').src = channel.url;
}

function playNext(){
  currentIndex = (currentIndex+1)%channels.length;
  playChannel(channels[currentIndex]);
}

function playPrevious(){
  currentIndex = (currentIndex-1+channels.length)%channels.length;
  playChannel(channels[currentIndex]);
}

function filterChannels(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const filtered = channels.filter(c=>c.name.toLowerCase().includes(search));
  renderChannels(filtered);
}

/* MOBILE MENU */
function toggleCategories(){
  document.querySelector('.categories').classList.toggle('active');
}

function toggleChannels(){
  document.querySelector('.channel-list').classList.toggle('active');
}

fetchChannels();
</script>

</body>
</html>
